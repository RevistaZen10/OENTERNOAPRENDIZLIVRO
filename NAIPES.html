  ]
};

const NAIPES = [
  { key: 'heart',   sym: '♥', label: 'Coração', color: '#e05a7a' },
  { key: 'club',    sym: '♣', label: 'Paus',    color: '#3a8fd4' },
  { key: 'diamond', sym: '♦', label: 'Ouros',   color: '#f0a030' },
  { key: 'spade',   sym: '♠', label: 'Espadas', color: '#4dbe8a' }
];

const visibility = { heart: true, club: true, diamond: true, spade: true };

function toggle(naipe) {
  visibility[naipe] = !visibility[naipe];
  const el = document.querySelector(`[data-naipe="${naipe}"]`);
  el.classList.toggle('muted', !visibility[naipe]);
  draw();
}

const canvas = document.getElementById('waveCanvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');

const SIZE = 680;
canvas.width = SIZE * 2;
canvas.height = SIZE * 2;
canvas.style.height = SIZE + 'px';
ctx.scale(2, 2);

const CX = SIZE / 2, CY = SIZE / 2;
const BASE_R = 210;
const WAVE_SCALE = 60;
const INNER_R = 28;

const chapters = NAIPE_DATA.chapters;
const parts = NAIPE_DATA.parts;
const N = chapters.length;

const maxVerse = Math.max(...chapters.map(c => c.verse_count));

function getAngle(idx) {
  return (idx / N) * 2 * Math.PI - Math.PI / 2;
}

function getMidAngle(partIdx) {
  const chs = chapters.filter(c => c.part_idx === partIdx);
  if (!chs.length) return 0;
  const first = chs[0].ch_idx;
  const last = chs[chs.length - 1].ch_idx;
  return (getAngle(first) + getAngle(last + 1)) / 2;
}

function chapterPoint(chIdx, naipeKey) {
  const ch = chapters[chIdx];
  const angle = getAngle(chIdx);
  const frac = ch.verse_count > 0 ? ch.naipe_counts[naipeKey] / ch.verse_count : 0;
  const r = BASE_R + frac * WAVE_SCALE;
  return { x: CX + r * Math.cos(angle), y: CY + r * Math.sin(angle), r, angle, frac };
}

function draw() {
  ctx.clearRect(0, 0, SIZE, SIZE);

  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)';
  const textColor = isDark ? 'rgba(255,255,255,0.65)' : 'rgba(0,0,0,0.65)';
  const textSec = isDark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.35)';
  const partBand = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.025)';

  // Concentric guide rings
  [0.25, 0.5, 0.75, 1.0].forEach(frac => {
    ctx.beginPath();
    ctx.arc(CX, CY, BASE_R + frac * WAVE_SCALE, 0, 2 * Math.PI);
    ctx.strokeStyle = gridColor;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  });

  // Base ring
  ctx.beginPath();
  ctx.arc(CX, CY, BASE_R, 0, 2 * Math.PI);
  ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.18)' : 'rgba(0,0,0,0.18)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Inner circle
  ctx.beginPath();
  ctx.arc(CX, CY, INNER_R, 0, 2 * Math.PI);
  ctx.fillStyle = isDark ? '#1a1a19' : '#f8f7f5';
  ctx.fill();
  ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // Part bands (alternating tinted arcs)
  parts.forEach((part, pi) => {
    const chs = chapters.filter(c => c.part_idx === pi);
    if (!chs.length) return;
    const a1 = getAngle(chs[0].ch_idx);
    const a2 = getAngle(chs[chs.length - 1].ch_idx + 1);
    ctx.beginPath();
    ctx.moveTo(CX + INNER_R * Math.cos(a1), CY + INNER_R * Math.sin(a1));
    ctx.arc(CX, CY, INNER_R, a1, a2);
    ctx.arc(CX, CY, BASE_R + WAVE_SCALE + 16, a2, a1, true);
    ctx.closePath();
    ctx.fillStyle = pi % 2 === 0 ? partBand : 'transparent';
    ctx.fill();
  });

  // Radial chapter dividers
  chapters.forEach((ch, ci) => {
    const angle = getAngle(ci);
    const r1 = ci % 5 === 0 ? INNER_R + 6 : BASE_R - 14;
    ctx.beginPath();
    ctx.moveTo(CX + r1 * Math.cos(angle), CY + r1 * Math.sin(angle));
    ctx.lineTo(CX + (BASE_R - 2) * Math.cos(angle), CY + (BASE_R - 2) * Math.sin(angle));
    ctx.strokeStyle = ci % 5 === 0
      ? (isDark ? 'rgba(255,255,255,0.25)' : 'rgba(0,0,0,0.2)')
      : gridColor;
    ctx.lineWidth = ci % 5 === 0 ? 1 : 0.5;
    ctx.stroke();
  });

  // Naipe sine waves (filled area + line)
  NAIPES.forEach(naipe => {
    if (!visibility[naipe.key]) return;

    const pts = chapters.map((_, ci) => chapterPoint(ci, naipe.key));

    // Fill area between base ring and wave
    ctx.beginPath();
    pts.forEach((p, i) => {
      if (i === 0) ctx.moveTo(p.x, p.y);
      else {
        const prev = pts[i - 1];
        const mx = (prev.x + p.x) / 2, my = (prev.y + p.y) / 2;
        ctx.quadraticCurveTo(prev.x, prev.y, mx, my);
      }
    });
    // Close along base ring backwards
    for (let i = pts.length - 1; i >= 0; i--) {
      const angle = getAngle(i);
      const bx = CX + BASE_R * Math.cos(angle), by = CY + BASE_R * Math.sin(angle);
      if (i === pts.length - 1) ctx.lineTo(bx, by);
      else ctx.lineTo(bx, by);
    }
    ctx.closePath();
    ctx.fillStyle = naipe.color + '22';
    ctx.fill();

    // Smooth wave line
    ctx.beginPath();
    pts.forEach((p, i) => {
      if (i === 0) ctx.moveTo(p.x, p.y);
      else {
        const prev = pts[i - 1];
        const mx = (prev.x + p.x) / 2, my = (prev.y + p.y) / 2;
        ctx.quadraticCurveTo(prev.x, prev.y, mx, my);
      }
    });
    ctx.strokeStyle = naipe.color;
    ctx.lineWidth = 1.8;
    ctx.lineJoin = 'round';
    ctx.stroke();

    // Dots at each chapter
    pts.forEach((p, i) => {
      const frac = chapters[i].naipe_counts[naipe.key] / (chapters[i].verse_count || 1);
      if (frac < 0.01) return;
      ctx.beginPath();
      ctx.arc(p.x, p.y, frac > 0.4 ? 4 : 2.5, 0, 2 * Math.PI);
      ctx.fillStyle = naipe.color;
      ctx.fill();
    });
  });

  // Part labels
  parts.forEach((part, pi) => {
    const midAngle = getMidAngle(pi);
    const labelR = BASE_R + WAVE_SCALE + 30;
    const lx = CX + labelR * Math.cos(midAngle);
    const ly = CY + labelR * Math.sin(midAngle);

    ctx.save();
    ctx.translate(lx, ly);
    let rot = midAngle + Math.PI / 2;
    if (midAngle > Math.PI / 2 && midAngle < Math.PI * 1.5) rot += Math.PI;
    ctx.rotate(rot);
    ctx.font = '500 11px sans-serif';
    ctx.fillStyle = textColor;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const shortTitle = part.title.replace('A ', '').replace('O ', '').replace('As ', '');
    ctx.fillText(`P${pi + 1} ${shortTitle}`, 0, 0);
    ctx.restore();
  });

  // Chapter numbers (tiny, near base ring)
  chapters.forEach((ch, ci) => {
    const angle = getAngle(ci) + (Math.PI / N);
    const labelR = BASE_R - 22;
    const lx = CX + labelR * Math.cos(angle);
    const ly = CY + labelR * Math.sin(angle);

    ctx.save();
    ctx.translate(lx, ly);
    let rot = angle + Math.PI / 2;
    if (angle > Math.PI / 2 && angle < Math.PI * 1.5) rot += Math.PI;
    ctx.rotate(rot);
    ctx.font = '400 9px sans-serif';
    ctx.fillStyle = textSec;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ci + 1, 0, 0);
    ctx.restore();
  });

  // Center label
  ctx.font = '500 11px sans-serif';
  ctx.fillStyle = textColor;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('OEA', CX, CY - 7);
  ctx.font = '400 9px sans-serif';
  ctx.fillStyle = textSec;
  ctx.fillText('61 cap.', CX, CY + 6);
}

// Interaction
let hoveredCh = null;

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = SIZE / rect.width;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleX;

  const dx = mx - CX, dy = my - CY;
  const angle = Math.atan2(dy, dx);
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < INNER_R || dist > BASE_R + WAVE_SCALE + 20) {
    tooltip.style.display = 'none';
    hoveredCh = null;
    return;
  }

  let normAngle = angle + Math.PI / 2;
  if (normAngle < 0) normAngle += 2 * Math.PI;
  const chIdx = Math.floor((normAngle / (2 * Math.PI)) * N) % N;
  const ch = chapters[chIdx];

  if (ch) {
    hoveredCh = chIdx;
    const part = parts[ch.part_idx];
    const pct = (n) => Math.round(n / ch.verse_count * 100);
    tooltip.innerHTML = `
      <strong>Cap. ${chIdx + 1}</strong> · ${part.title}<br>
      ${ch.verse_count} versículos<br>
      <span style="color:#e05a7a">♥ ${ch.naipe_counts.heart} (${pct(ch.naipe_counts.heart)}%)</span>
      <span style="color:#3a8fd4;margin-left:8px">♣ ${ch.naipe_counts.club} (${pct(ch.naipe_counts.club)}%)</span><br>
      <span style="color:#f0a030">♦ ${ch.naipe_counts.diamond} (${pct(ch.naipe_counts.diamond)}%)</span>
      <span style="color:#4dbe8a;margin-left:8px">♠ ${ch.naipe_counts.spade} (${pct(ch.naipe_counts.spade)}%)</span>
    `;
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX - rect.left + 14) + 'px';
    tooltip.style.top = (e.clientY - rect.top - 10) + 'px';
  }
});

canvas.addEventListener('mouseleave', () => {
  tooltip.style.display = 'none';
});

canvas.addEventListener('click', (e) => {
  if (hoveredCh !== null) {
    const ch = chapters[hoveredCh];
    const part = parts[ch.part_idx];
    sendPrompt(`Analise a distribuição dos naipes no capítulo ${hoveredCh + 1} (${ch.verse_count} versículos): ♥ ${ch.naipe_counts.heart}, ♣ ${ch.naipe_counts.club}, ♦ ${ch.naipe_counts.diamond}, ♠ ${ch.naipe_counts.spade}. Está equilibrado?`);
  }
});

draw();
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', draw);
</script>
