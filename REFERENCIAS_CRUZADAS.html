const ouE={},inE={},totO={},totI={};
ED.forEach(e=>{
  if(!ouE[e.src])ouE[e.src]=[];ouE[e.src].push(e);
  if(!inE[e.tgt])inE[e.tgt]=[];inE[e.tgt].push(e);
  totO[e.src]=(totO[e.src]||0)+e.count;
  totI[e.tgt]=(totI[e.tgt]||0)+e.count;
});

let sel=null,minE=1,pf=-1;
const svg=document.getElementById('svg');
const tip=document.getElementById('tip');
const si=document.getElementById('si');
const st=document.getElementById('st');

function apply(){
  const all=svg.querySelectorAll('.edge');
  let vc=0;
  all.forEach(el=>{
    const src=+el.dataset.src,tgt=+el.dataset.tgt,cnt=+el.dataset.cnt;
    const vis=cnt>=minE&&(pf===-1||CP[src]===pf);
    if(!vis){el.style.opacity='0';return;}
    vc++;
    if(sel!==null){
      const ok=src===sel||tgt===sel;
      el.style.opacity=ok?'1':'0.02';
      el.style.strokeWidth=ok?'2.5px':'';
    }else{
      el.style.opacity='';
      el.style.strokeWidth='';
    }
  });
  st.textContent=vc+' arestas visíveis';
}

document.getElementById('me').addEventListener('input',function(){
  minE=+this.value;document.getElementById('mev').textContent=minE;apply();
});
document.getElementById('pf').addEventListener('change',function(){pf=+this.value;apply();});
document.getElementById('clr').addEventListener('click',function(){
  sel=null;si.textContent='Clique num capítulo (bloco colorido) para filtrar suas conexões';apply();
});

svg.addEventListener('click',e=>{
  const n=e.target.closest('.cap-node');
  if(!n)return;
  const cap=+n.dataset.cap;
  if(sel===cap){sel=null;si.textContent='Clique num capítulo (bloco colorido) para filtrar suas conexões';}
  else{
    sel=cap;
    const d=CD[cap],pn=PN[d.part]||'Prólogo';
    si.textContent='Cap '+(cap||'Prólogo')+' · '+pn+' · '+d.verse_count+'v · '+( totO[cap]||0)+' saindo · '+(totI[cap]||0)+' entrando';
  }
  apply();
});

svg.addEventListener('mousemove',e=>{
  const n=e.target.closest('.cap-node');
  if(n){
    const cap=+n.dataset.cap,d=CD[cap];
    const col=PC[d.part]||'#888';
    tip.innerHTML='<b style="color:'+col+'">Cap '+(cap||'Prólogo')+'</b><br><span style="color:#aaa">'+PN[d.part]+'</span><br>'+d.title+'<br><span style="color:#7af">'+d.verse_count+' versículos</span><br><span style="color:#fa7">→ envia: '+(totO[cap]||0)+'</span><br><span style="color:#7fa">← recebe: '+(totI[cap]||0)+'</span>';
    tip.style.display='block';tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY-8)+'px';
  }else tip.style.display='none';
});
svg.addEventListener('mouseleave',()=>tip.style.display='none');
apply();
